<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Needle body -->
  <line x1="6" y1="26" x2="24" y2="6" stroke="#C84B2F" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Needle tip (sharp point) -->
  <polygon points="24,6 26,4 25,7" fill="#C84B2F"/>
  <!-- Needle eye (oval hole near blunt end) -->
  <ellipse cx="8" cy="24" rx="2" ry="1.2" transform="rotate(-45 8 24)" fill="none" stroke="#C84B2F" stroke-width="1.2"/>
  <!-- Thread coming from eye -->
  <path d="M 7 25 Q 3 28 5 30 Q 7 32 9 29" fill="none" stroke="#C84B2F" stroke-width="1.2" stroke-linecap="round"/>
</svg>
