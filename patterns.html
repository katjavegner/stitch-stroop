<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pattern Websites — Stitch &amp; Stroop</title>
  <meta name="description" content="Sewing pattern websites that work for sewists in the Netherlands, including foreign card payment options.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="site-nav"></div>

  <main>
    <div class="container">

      <header class="page-header">
        <span class="eyebrow">Indie patterns &middot; PDF &middot; digital</span>
        <h1>Pattern websites</h1>
        <p class="subtitle">Sites we actually use — with notes on language and payment options.</p>
      </header>

      <!-- Language filters -->
      <div id="lang-filters" class="filter-chips" role="group" aria-label="Filter by language"></div>

      <!-- Payment filters -->
      <div id="payment-filters" class="filter-chips" role="group" aria-label="Filter by payment type"></div>

      <!-- Pattern cards -->
      <div id="pattern-list" aria-live="polite" aria-label="Pattern site listings"></div>


    </div>
  </main>

  <div id="site-footer"></div>

  <noscript>
    <div class="container">
      <div class="noscript-warning">
        Pattern listings require JavaScript. Please enable JavaScript in your browser to view this page.
      </div>
    </div>
  </noscript>

  <script type="module" src="js/nav.js"></script>
  <script type="module" src="js/patterns.js"></script>

</body>
</html>
