<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fabric Shops — Stitch &amp; Stroop</title>
  <meta name="description" content="Fabric shops and notions stores in the Netherlands, curated by the Stitch &amp; Stroop community.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
</head>
<body>

  <div id="site-nav"></div>

  <main>
    <div class="container">

      <header class="page-header">
        <span class="eyebrow">Fabric &middot; notions &middot; markets</span>
        <h1>Fabric shops</h1>
        <p class="subtitle">Where to find good fabric in the Netherlands — tried and tested by the community.</p>
      </header>

      <!-- Map -->
      <div id="map" aria-label="Map of fabric shops"></div>

      <!-- City filters -->
      <div id="city-filters" class="filter-chips" role="group" aria-label="Filter by city"></div>

      <!-- Shop cards -->
      <div id="shop-list" aria-live="polite" aria-label="Shop listings"></div>


    </div>
  </main>

  <div id="site-footer"></div>

  <noscript>
    <div class="container">
      <div class="noscript-warning">
        Shop listings and the map require JavaScript. Please enable JavaScript in your browser to view this page.
      </div>
    </div>
  </noscript>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/sp38=" crossorigin=""></script>

  <script type="module" src="js/nav.js"></script>
  <script type="module" src="js/stores.js"></script>

</body>
</html>
